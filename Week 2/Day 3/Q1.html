<!DOCTYPE html>
<html>
<head>
  <title>Weather Data Fetcher</title>
</head>
<body>

<h2>Weather Report</h2>
<button onclick="getWeatherWithPromises()">Fetch Using Promises</button>
<button onclick="getWeatherAsync()">Fetch Using Async/Await</button>

<div id="weather" style="margin-top:20px;"></div>

<script>

  const latitude = 13.62;
  const longitude = 79.42;

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`;


  const getWeatherWithPromises = () => {

    fetch(url)
      .then(response => {
        if (!response.ok) {
          throw new Error("Failed to fetch weather data (Promises)");
        }
        return response.json();
      })
      .then(data => {
        const weather = data.current_weather;

        const report = `
          <h3>🌤️ Weather Report (Promises)</h3>
          <p><strong>Temperature:</strong> ${weather.temperature}°C</p>
          <p><strong>Wind Speed:</strong> ${weather.windspeed} km/h</p>
          <p><strong>Wind Direction:</strong> ${weather.winddirection}°</p>
          <p><strong>Time:</strong> ${weather.time}</p>
        `;

        document.getElementById("weather").innerHTML = report;
      })
      .catch(error => {
        document.getElementById("weather").innerHTML =
          `<p style="color:red;">${error.message}</p>`;
      });
  };


  const getWeatherAsync = async () => {
    try {

      const response = await fetch(url);

      if (!response.ok) {
        throw new Error("Failed to fetch weather data (Async/Await)");
      }

      const data = await response.json();
      const weather = data.current_weather;

      const report = `
        <h3>🌤️ Weather Report (Async/Await)</h3>
        <p><strong>Temperature:</strong> ${weather.temperature}°C</p>
        <p><strong>Wind Speed:</strong> ${weather.windspeed} km/h</p>
        <p><strong>Wind Direction:</strong> ${weather.winddirection}°</p>
        <p><strong>Time:</strong> ${weather.time}</p>
      `;

      document.getElementById("weather").innerHTML = report;

    } catch (error) {
      document.getElementById("weather").innerHTML =
        `<p style="color:red;">${error.message}</p>`;
    }
  };

</script>

</body>
</html>
