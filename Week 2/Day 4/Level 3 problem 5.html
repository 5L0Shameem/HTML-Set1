<!DOCTYPE html>
<html>
<head>
  <title>OOP - Student Class</title>
</head>
<body>

  <h2>Student Details</h2>
  <div id="output"></div>

  <script>
    class Student {
      constructor(name, rollNumber, marks) {
        this.name = name;
        this.rollNumber = rollNumber;
        this.marks = marks;
      }

      getDetails() {
        return `
          <p><strong>Name:</strong> ${this.name}</p>
          <p><strong>Roll Number:</strong> ${this.rollNumber}</p>
          <p><strong>Marks:</strong> ${this.marks}</p>
        `;
      }

      getGrade() {
        if (this.marks >= 90) return "A";
        else if (this.marks >= 75) return "B";
        else if (this.marks >= 50) return "C";
        else return "Fail";
      }
    }
    const student1 = new Student("Shameem", 101, 92);
    const student2 = new Student("Aisha", 102, 68);
    const outputDiv = document.getElementById("output");

    outputDiv.innerHTML += `
      <div>
        ${student1.getDetails()}
        <p><strong>Grade:</strong> ${student1.getGrade()}</p>
        <hr>
      </div>
    `;

    outputDiv.innerHTML += `
      <div>
        ${student2.getDetails()}
        <p><strong>Grade:</strong> ${student2.getGrade()}</p>
      </div>
    `;
  </script>

</body>
</html>
