<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronics Store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Electronics Store</h2>
  <div class="row g-4">
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">iPhone 15</h5>
          <p class="card-text text-muted">Latest Apple smartphone with advanced features.</p>
          <p class="fw-bold text-primary">₹79,999</p>
          <div class="mt-auto">
            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
            <button class="btn btn-outline-secondary w-100">View Details</button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Samsung Galaxy S23</h5>
          <p class="card-text text-muted">High-performance Android smartphone.</p>
          <p class="fw-bold text-primary">₹69,999</p>
          <div class="mt-auto">
            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
            <button class="btn btn-outline-secondary w-100">View Details</button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">MacBook Air</h5>
          <p class="card-text text-muted">Lightweight and powerful laptop.</p>
          <p class="fw-bold text-primary">₹99,999</p>
          <div class="mt-auto">
            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
            <button class="btn btn-outline-secondary w-100">View Details</button>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Sony Headphones</h5>
          <p class="card-text text-muted">Noise-cancelling wireless headphones.</p>
          <p class="fw-bold text-primary">₹14,999</p>
          <div class="mt-auto">
            <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
            <button class="btn btn-outline-secondary w-100">View Details</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
